<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaquaNav</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    /* ── VARIÁVEIS DE TEMA ── */
    :root {
      --bg-body: #f4f6f8;
      --bg-navbar: #0b1b2b;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-offcanvas: #ffffff;
      --text-primary: #0b1b2b;
      --text-secondary: #555;
      --text-muted: #888;
      --border: #dee2e6;
      --accent: #4da6ff;
      --popup-bg: #ffffff;
      --popup-text: #0b1b2b;
      --search-result-bg: #ffffff;
      --search-result-hover: #f0f4f8;
      --shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    body.dark-mode {
      --bg-body: #0d0d1a;
      --bg-navbar: #07070f;
      --bg-card: #14142a;
      --bg-input: #1a1a35;
      --bg-offcanvas: #14142a;
      --text-primary: #e0e0ff;
      --text-secondary: #9090cc;
      --text-muted: #5555aa;
      --border: #2a2a50;
      --accent: #7eb8ff;
      --popup-bg: #1a1a35;
      --popup-text: #e0e0ff;
      --search-result-bg: #14142a;
      --search-result-hover: #1e1e40;
      --shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    /* ── BASE ── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg-body);
      transition: background 0.3s;
    }

    body {
      padding-top: 110px;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: var(--bg-navbar) !important;
      border-bottom: 2px solid rgba(255,255,255,0.05);
      padding: 8px 16px;
      transition: background 0.3s;
      flex-wrap: nowrap;
    }

    .navbar-brand img {
      max-height: 38px;
    }

    /* ── BARRA DE BUSCA ── */
    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 420px;
    }

    .search-input {
      width: 100%;
      padding: 8px 16px 8px 40px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(77,166,255,0.15);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      display: none;
      padding: 0;
      line-height: 1;
    }

    /* ── RESULTADOS DA BUSCA ── */
    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--search-result-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      z-index: 9999;
      display: none;
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
    }

    .search-results.active { display: block; }

    .search-result-item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border-bottom: 0.5px solid var(--border);
      transition: background 0.15s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--search-result-hover); }

    .result-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

    .result-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .result-addr {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .result-loading {
      padding: 14px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── BOTÕES DA NAVBAR ── */
    .btn-nav {
      background: #fff;
      color: #0b1b2b;
      border: none;
      border-radius: 10px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-nav:hover { background: #f0f0f0; }

    body.dark-mode .btn-nav {
      background: var(--accent);
      color: #07070f;
    }

    /* ── BOTÃO TEMA ── */
    .btn-theme {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-theme:hover { background: rgba(255,255,255,0.22); }

    /* ── MAPA ── */
    #mapa {
      flex: 1;
      width: 100%;
    }

    /* ── POPUP LEAFLET ── */
    .leaflet-popup-content-wrapper {
      background: var(--popup-bg) !important;
      color: var(--popup-text) !important;
      border-radius: 12px !important;
      box-shadow: var(--shadow) !important;
      border: 1px solid var(--border);
    }

    .leaflet-popup-tip {
      background: var(--popup-bg) !important;
    }

    .leaflet-popup-content {
      margin: 12px 16px !important;
      color: var(--popup-text) !important;
    }

    .leaflet-popup-content h6 {
      color: var(--popup-text) !important;
      font-weight: 700;
    }

    .leaflet-popup-content p,
    .leaflet-popup-content small {
      color: var(--text-secondary) !important;
    }

    /* ── MARCADORES EMOJI ── */
    .custom-div-icon { background: transparent; border: none; }
    .emoji-marker {
      font-size: 26px;
      line-height: 30px;
      text-align: center;
      width: 30px;
      height: 30px;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
    }

    /* ── OFFCANVAS (FILTROS) ── */
    .offcanvas {
      background: var(--bg-offcanvas) !important;
      color: var(--text-primary) !important;
      border-left: 1px solid var(--border) !important;
      transition: background 0.3s;
    }

    .offcanvas-title { color: var(--text-primary) !important; }

    .form-check-label { color: var(--text-primary) !important; }

    .list-group-item {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
      transition: background 0.3s;
    }

    /* ── MODAL (NOVO PIN) ── */
    .modal-content {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--border) !important;
    }

    .modal-header {
      background: var(--bg-navbar) !important;
      border-bottom: 1px solid rgba(255,255,255,0.1) !important;
    }

    .modal-footer { border-top: 1px solid var(--border) !important; }

    .form-label { color: var(--text-primary) !important; }

    .form-control, .form-select {
      background: var(--bg-input) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
      transition: all 0.3s;
    }

    .form-control::placeholder { color: var(--text-muted) !important; }
    .form-control:focus, .form-select:focus {
      box-shadow: 0 0 0 3px rgba(77,166,255,0.2) !important;
      border-color: var(--accent) !important;
    }

    /* ── OVERLAY CARREGAMENTO ── */
    #overlayCarregamento {
      z-index: 9999 !important;
    }

    /* ── TILE DARK ── */
    body.dark-mode .leaflet-tile {
      filter: brightness(0.65) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 576px) {
      .search-wrapper { max-width: 200px; }
      .btn-nav { padding: 6px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

<!-- Overlay de Carregamento -->
<div id="overlayCarregamento"
  class="d-none position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-75 d-flex flex-column justify-content-center align-items-center text-white">
  <div class="spinner-border text-primary" style="width:4rem;height:4rem;" role="status"></div>
  <h4 class="mt-4 fw-bold">Identificando sua localização...</h4>
</div>

<!-- NAVBAR -->
<nav class="navbar fixed-top shadow-sm">
  <div class="container-fluid d-flex align-items-center gap-2 flex-nowrap">

    <!-- Logo -->
    <a class="navbar-brand p-0 me-2 flex-shrink-0" href="#" id="btnIrParaIgreja">
      <img src="logo.png" alt="SaquaNav" style="max-height:38px;"
        onerror="this.outerHTML='<span style=\'color:#fff;font-size:18px;font-weight:700\'>Saqua<span style=\'color:#4da6ff\'>Nav</span></span>'">
    </a>

    <!-- Barra de busca -->
    <div class="search-wrapper flex-grow-1">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Buscar endereço em Saquarema..."
        autocomplete="off"
        oninput="handleSearch(this.value)"
      >
      <button class="search-clear" id="searchClear" onclick="limparBusca()">×</button>

      <!-- Resultados -->
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Botões -->
    <div class="d-flex align-items-center gap-2 flex-shrink-0">
      <button class="btn-nav" onclick="centralizarNaMinhaLocalizacao()">📍 Localização</button>
      <button class="btn-nav" type="button" data-bs-toggle="offcanvas" data-bs-target="#filtrosOffcanvas">Filtros</button>
      <button class="btn-theme" id="btnTema" onclick="alternarTema()" title="Alternar tema">🌙</button>
    </div>

  </div>
</nav>

<!-- MAPA -->
<div id="mapa"></div>

<!-- OFFCANVAS FILTROS -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="filtrosOffcanvas">
  <div class="offcanvas-header border-bottom" style="border-color: var(--border) !important;">
    <h5 class="offcanvas-title fw-bold">Seleção de Marcadores</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <h6 style="color:var(--text-primary)">Filtros</h6>
    <div class="form-check">
      <input class="form-check-input filtro-checkbox" type="checkbox" value="Trânsito" id="filtroTransito" checked>
      <label class="form-check-label" for="filtroTransito">🚗 Trânsito</label>
    </div>
    <div class="form-check">
      <input class="form-check-input filtro-checkbox" type="checkbox" value="Evento" id="filtroEvento" checked>
      <label class="form-check-label" for="filtroEvento">🎉 Evento</label>
    </div>
    <div class="form-check">
      <input class="form-check-input filtro-checkbox" type="checkbox" value="Incidente" id="filtroIncidente" checked>
      <label class="form-check-label" for="filtroIncidente">⚠️ Incidente</label>
    </div>
    <div class="form-check">
      <input class="form-check-input filtro-checkbox" type="checkbox" value="Obras" id="filtroObras" checked>
      <label class="form-check-label" for="filtroObras">🚧 Obras</label>
    </div>
    <div class="form-check mt-2">
      <input class="form-check-input filtro-checkbox" type="checkbox" value="Favorito" id="filtroFavoritos" checked>
      <label class="form-check-label fw-bold" style="color:#e05555 !important" for="filtroFavoritos">❤️ Favoritos</label>
    </div>
    <hr style="border-color:var(--border)">
    <h6 style="color:var(--text-primary)">Favoritos Salvos</h6>
    <ul class="list-group" id="listaFavoritos"></ul>
  </div>
</div>

<!-- MODAL NOVO PIN -->
<div class="modal fade" id="modalRelatorio" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-white">Novo Pin</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formRelatorio">
          <input type="hidden" id="relatorioLat">
          <input type="hidden" id="relatorioLng">
          <input type="hidden" id="editFavoritoId">

          <div class="mb-3">
            <label for="tipoRelatorio" class="form-label">Escolha um marcador</label>
            <select class="form-select" id="tipoRelatorio" required>
              <option value="" disabled selected>Selecione um tipo...</option>
              <option value="Trânsito">🚗 Trânsito</option>
              <option value="Evento">🎉 Evento</option>
              <option value="Incidente">⚠️ Incidente</option>
              <option value="Obras">🚧 Obras</option>
              <option value="Favorito">🔘 Favorito</option>
            </select>
          </div>

          <div id="containerFavorito" class="mb-3 d-none">
            <label class="form-label">Detalhes do Favorito</label>
            <div class="row g-2">
              <div class="col-3">
                <select class="form-select text-center fs-5" id="emojiFavorito">
                  <option value="🔘">🔘</option><option value="❤️">❤️</option>
                  <option value="⭐">⭐</option><option value="🌟">🌟</option>
                  <option value="📌">📌</option><option value="🏠">🏠</option>
                  <option value="💼">💼</option><option value="🍔">🍔</option>
                  <option value="☕">☕</option><option value="🛒">🛒</option>
                  <option value="🏆">🏆</option><option value="🔥">🔥</option>
                </select>
              </div>
              <div class="col-9">
                <input type="text" class="form-control" id="tituloFavorito" placeholder="Ex: Casa, Trabalho, Café...">
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="enderecoRelatorio" class="form-label">Endereço</label>
            <input type="text" class="form-control fw-bold" id="enderecoRelatorio" placeholder="Buscando endereço...">
          </div>

          <div class="mb-3">
            <label class="form-label">Foto do Local (Opcional)</label>
            <label for="imagemRelatorio" class="btn btn-outline-primary w-100 fw-bold d-flex justify-content-center align-items-center gap-2">
              <span style="font-size:1.4rem">📸</span> Câmera / Galeria
            </label>
            <input class="d-none" type="file" id="imagemRelatorio" accept="image/*" capture="environment">
            <div id="previewContainer" class="mt-2 d-none text-center">
              <img id="previewImagem" src="" class="img-fluid rounded shadow-sm" style="max-height:150px;" alt="Preview">
            </div>
          </div>

          <div class="mb-3">
            <label for="descRelatorio" class="form-label">Descrição (Opcional)</label>
            <textarea class="form-control" id="descRelatorio" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary w-100 mb-2" id="btnSalvarRelatorio">Criar Pin</button>
        <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ── TEMA ──
let isDarkMode = false;

function alternarTema() {
  isDarkMode = !isDarkMode;
  document.body.classList.toggle('dark-mode', isDarkMode);
  document.getElementById('btnTema').textContent = isDarkMode ? '☀️' : '🌙';
  localStorage.setItem('saquanav-tema', isDarkMode ? 'dark' : 'light');
}

// Restaurar tema salvo
if (localStorage.getItem('saquanav-tema') === 'dark') {
  isDarkMode = true;
  document.body.classList.add('dark-mode');
  document.getElementById('btnTema').textContent = '☀️';
}

// ── MAPA ──
const coordPadrao = [-22.928393178257554, -42.49153075552434];

const mapa = L.map('mapa', { doubleClickZoom: false }).setView(coordPadrao, 15);

const tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(mapa);

// ── BUSCA DE ENDEREÇO (Nominatim) ──
let searchTimer = null;
let searchMarker = null;

function handleSearch(val) {
  const clear = document.getElementById('searchClear');
  clear.style.display = val.length > 0 ? 'block' : 'none';

  clearTimeout(searchTimer);
  const box = document.getElementById('searchResults');

  if (val.trim().length < 3) {
    box.classList.remove('active');
    return;
  }

  box.innerHTML = '<div class="result-loading">🔍 Buscando...</div>';
  box.classList.add('active');

  searchTimer = setTimeout(() => {
    const query = encodeURIComponent(val + ', Saquarema, Rio de Janeiro, Brasil');
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5&addressdetails=1`, {
      headers: { 'Accept-Language': 'pt-BR' }
    })
    .then(r => r.json())
    .then(data => {
      if (!data.length) {
        box.innerHTML = '<div class="result-loading">Nenhum endereço encontrado.</div>';
        return;
      }
      box.innerHTML = data.map((item, i) => `
        <div class="search-result-item" onclick="irParaEndereco(${item.lat}, ${item.lon}, '${item.display_name.replace(/'/g, "\\'")}')">
          <span class="result-icon">📍</span>
          <div>
            <div class="result-name">${item.display_name.split(',')[0]}</div>
            <div class="result-addr">${item.display_name.split(',').slice(1,3).join(',').trim()}</div>
          </div>
        </div>
      `).join('');
    })
    .catch(() => {
      box.innerHTML = '<div class="result-loading">Erro na busca. Tente novamente.</div>';
    });
  }, 500);
}

function irParaEndereco(lat, lon, nome) {
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('searchInput').value = nome.split(',')[0];

  if (searchMarker) mapa.removeLayer(searchMarker);

  searchMarker = L.marker([lat, lon], {
    icon: L.divIcon({
      html: '<div class="emoji-marker">🔍</div>',
      className: 'custom-div-icon',
      iconSize: [30, 30],
      iconAnchor: [15, 15],
      popupAnchor: [0, -15]
    })
  }).addTo(mapa);

  searchMarker.bindPopup(`<div><h6>📍 ${nome.split(',')[0]}</h6><small>${nome.split(',').slice(1,3).join(',').trim()}</small></div>`).openPopup();
  mapa.flyTo([lat, lon], 17);
}

function limparBusca() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchResults').classList.remove('active');
  if (searchMarker) { mapa.removeLayer(searchMarker); searchMarker = null; }
}

// Fechar resultados ao clicar fora
document.addEventListener('click', function(e) {
  const wrapper = document.querySelector('.search-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('searchResults').classList.remove('active');
  }
});

// ── LOCALIZAÇÃO ──
let marcadorMinhaLocalizacao = null;
const iconeLocalizacao = new L.Icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
  shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
  iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
});

function centralizarNaMinhaLocalizacao() {
  const overlay = document.getElementById('overlayCarregamento');
  overlay.classList.remove('d-none');

  function moverPara(latLng, desc) {
    overlay.classList.add('d-none');
    mapa.flyTo(latLng, 16);
    if (marcadorMinhaLocalizacao) {
      marcadorMinhaLocalizacao.setLatLng(latLng);
      marcadorMinhaLocalizacao.getPopup().setContent(`<h6>📍 ${desc}</h6>`);
    } else {
      marcadorMinhaLocalizacao = L.marker(latLng, { icon: iconeLocalizacao }).addTo(mapa);
      marcadorMinhaLocalizacao.bindPopup(`<h6>📍 ${desc}</h6>`);
    }
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => moverPara([pos.coords.latitude, pos.coords.longitude], 'Você está aqui!'),
      err => {
        overlay.classList.add('d-none');
        alert('Não foi possível obter sua localização. Usando localização padrão.');
        moverPara(coordPadrao, 'Localização padrão');
      },
      { enableHighAccuracy: false, timeout: 15000, maximumAge: 0 }
    );
  } else {
    overlay.classList.add('d-none');
    moverPara(coordPadrao, 'Localização padrão');
  }
}

document.getElementById('btnIrParaIgreja').addEventListener('click', e => {
  e.preventDefault();
  mapa.flyTo(coordPadrao, 15);
});

// ── ESTADO ──
let relatorios = [];
let favoritos = [];
let filtrosAtivos = new Set(['Trânsito', 'Evento', 'Incidente', 'Obras', 'Favorito']);
const camadaMarcadores = L.layerGroup().addTo(mapa);
let latLngCliqueAtual = null;

const elementoModalRelatorio = document.getElementById('modalRelatorio');
const modalRelatorio = new bootstrap.Modal(elementoModalRelatorio);

// ── MARCADORES ──
const obterEmoji = tipo => ({ 'Trânsito':'🚗','Evento':'🎉','Incidente':'⚠️','Obras':'🚧','Favorito':'❤️' }[tipo] || '📍');

const criarIcone = tipo => L.divIcon({
  html: `<div class="emoji-marker">${obterEmoji(tipo)}</div>`,
  className: 'custom-div-icon',
  iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -15]
});

function renderizarMarcadores() {
  camadaMarcadores.clearLayers();

  relatorios.forEach(r => {
    if (!filtrosAtivos.has(r.tipo)) return;
    const m = L.marker([r.lat, r.lng], { icon: criarIcone(r.tipo) });
    const imgHtml = r.imagem_base64 ? `<div class="mt-2 text-center"><img src="${r.imagem_base64}" style="max-width:100%;max-height:150px;border-radius:8px;"></div>` : '';
    const data = new Date(r.timestamp.replace(' ','T')+'Z').toLocaleString('pt-BR');
    m.bindPopup(`<div style="min-width:200px">
      <h6 class="fw-bold">${obterEmoji(r.tipo)} ${r.tipo}</h6>
      ${r.endereco ? `<small style="color:var(--text-muted)">📍 ${r.endereco}</small><br>` : ''}
      ${imgHtml}
      ${r.descricao ? `<p class="mt-2 mb-1">${r.descricao}</p>` : ''}
      <small style="color:var(--text-muted)">${data}</small>
    </div>`);
    camadaMarcadores.addLayer(m);
  });

  if (filtrosAtivos.has('Favorito')) {
    favoritos.forEach(fav => {
      const emoji = fav.emoji || '❤️';
      const m = L.marker([fav.lat, fav.lng], {
        icon: L.divIcon({ html: `<div class="emoji-marker">${emoji}</div>`, className: 'custom-div-icon', iconSize:[30,30], iconAnchor:[15,15], popupAnchor:[0,-15] })
      });
      const data = new Date(fav.timestamp.replace(' ','T')+'Z').toLocaleString('pt-BR');
      m.bindPopup(`<div style="min-width:200px">
        <h6 class="fw-bold">${emoji} ${fav.nome}</h6>
        ${fav.endereco ? `<small style="color:var(--text-muted)">📍 ${fav.endereco}</small><br>` : ''}
        ${fav.descricao ? `<p class="mt-2 mb-1">${fav.descricao}</p>` : ''}
        <small style="color:var(--text-muted)">${data}</small>
        <button class="btn btn-sm btn-outline-primary w-100 mt-2" onclick="abrirModalEdicaoFavorito(${fav.id})">✏️ Editar</button>
      </div>`);
      camadaMarcadores.addLayer(m);
    });
  }
}

function renderizarFavoritos() {
  const lista = document.getElementById('listaFavoritos');
  lista.innerHTML = '';
  favoritos.forEach(fav => {
    const li = document.createElement('li');
    li.className = 'list-group-item d-flex justify-content-between align-items-center list-group-item-action fw-bold';
    li.style.cursor = 'pointer';
    li.innerHTML = `
      <div class="text-truncate" style="max-width:70%">${fav.emoji || '❤️'} ${fav.nome}</div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation();abrirModalEdicaoFavorito(${fav.id})">✏️</button>
        <span class="badge bg-primary rounded-pill">Ir</span>
      </div>`;
    li.onclick = () => {
      mapa.flyTo([fav.lat, fav.lng], 16);
      bootstrap.Offcanvas.getInstance(document.getElementById('filtrosOffcanvas'))?.hide();
    };
    lista.appendChild(li);
  });
  renderizarMarcadores();
}

// ── API ──
async function buscarRelatorios() {
  try {
    const r = await fetch('/api/relatorios');
    relatorios = await r.json();
    renderizarMarcadores();
  } catch(e) { console.warn('API offline — modo demo'); }
}

async function buscarFavoritos() {
  try {
    const r = await fetch('/api/favoritos');
    favoritos = await r.json();
    renderizarFavoritos();
  } catch(e) { console.warn('API offline — modo demo'); }
}

// ── CRIAR PIN ──
mapa.on('dblclick', async e => {
  latLngCliqueAtual = e.latlng;
  document.getElementById('relatorioLat').value = e.latlng.lat;
  document.getElementById('relatorioLng').value = e.latlng.lng;
  document.getElementById('enderecoRelatorio').value = 'Buscando...';
  document.getElementById('tipoRelatorio').value = '';
  document.getElementById('descRelatorio').value = '';
  document.getElementById('containerFavorito').classList.add('d-none');
  document.getElementById('editFavoritoId').value = '';
  document.getElementById('previewContainer').classList.add('d-none');
  modalRelatorio.show();

  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&accept-language=pt-BR`);
    const data = await r.json();
    document.getElementById('enderecoRelatorio').value = data.display_name || 'Endereço não encontrado';
  } catch { document.getElementById('enderecoRelatorio').value = 'Não foi possível obter o endereço'; }
});

document.getElementById('tipoRelatorio').addEventListener('change', function() {
  document.getElementById('containerFavorito').classList.toggle('d-none', this.value !== 'Favorito');
});

document.getElementById('imagemRelatorio').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImagem').src = e.target.result;
    document.getElementById('previewContainer').classList.remove('d-none');
  };
  reader.readAsDataURL(file);
});

document.getElementById('btnSalvarRelatorio').addEventListener('click', async () => {
  const tipo = document.getElementById('tipoRelatorio').value;
  if (!tipo) { alert('Selecione um tipo de marcador!'); return; }

  const lat = document.getElementById('relatorioLat').value;
  const lng = document.getElementById('relatorioLng').value;
  const endereco = document.getElementById('enderecoRelatorio').value;
  const descricao = document.getElementById('descRelatorio').value;
  const imagemInput = document.getElementById('imagemRelatorio');
  let imagem_base64 = null;

  if (imagemInput.files[0]) {
    imagem_base64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(imagemInput.files[0]);
    });
  }

  if (tipo === 'Favorito') {
    const emoji = document.getElementById('emojiFavorito').value;
    const nome = document.getElementById('tituloFavorito').value || 'Favorito';
    const editId = document.getElementById('editFavoritoId').value;
    const payload = { lat, lng, nome, emoji, endereco, descricao, imagem_base64 };
    try {
      await fetch(editId ? `/api/favoritos/${editId}` : '/api/favoritos', {
        method: editId ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      await buscarFavoritos();
    } catch { alert('Não foi possível salvar (API offline).'); }
  } else {
    try {
      await fetch('/api/relatorios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat, lng, tipo, endereco, descricao, imagem_base64 })
      });
      await buscarRelatorios();
    } catch { alert('Não foi possível salvar (API offline).'); }
  }

  modalRelatorio.hide();
});

function abrirModalEdicaoFavorito(id) {
  const fav = favoritos.find(f => f.id === id);
  if (!fav) return;
  document.getElementById('relatorioLat').value = fav.lat;
  document.getElementById('relatorioLng').value = fav.lng;
  document.getElementById('tipoRelatorio').value = 'Favorito';
  document.getElementById('containerFavorito').classList.remove('d-none');
  document.getElementById('emojiFavorito').value = fav.emoji || '🔘';
  document.getElementById('tituloFavorito').value = fav.nome;
  document.getElementById('enderecoRelatorio').value = fav.endereco || '';
  document.getElementById('descRelatorio').value = fav.descricao || '';
  document.getElementById('editFavoritoId').value = fav.id;
  modalRelatorio.show();
}

// ── FILTROS ──
document.querySelectorAll('.filtro-checkbox').forEach(cb => {
  cb.addEventListener('change', function() {
    if (this.checked) filtrosAtivos.add(this.value);
    else filtrosAtivos.delete(this.value);
    renderizarMarcadores();
  });
});

// ── INIT ──
buscarRelatorios();
buscarFavoritos();
</script>

</body>
</html>
