<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SaquaNav</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.navbar {
  background: #0b1b2b;
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  height: 40px;
}

#mapa {
  width: 100%;
  height: calc(100vh - 60px);
}

.btn {
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <img src="logo.png" class="logo">
  <strong>SaquaNav</strong>
  <button class="btn" onclick="minhaLoc()">📍</button>
</div>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAPA
const mapa = L.map('mapa').setView([-22.9295, -42.4970], 14);
mapa.doubleClickZoom.disable();

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(mapa);

// ICONES
function icone(e){
  return L.divIcon({
    html: "<div style='font-size:24px'>" + e + "</div>",
    iconSize:[30,30]
  });
}

// LOCALIZAÇÃO
function minhaLoc(){
  if(!navigator.geolocation){
    alert("Sem suporte");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(pos){
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    L.marker([lat,lon],{icon:icone('📍')})
    .addTo(mapa)
    .bindPopup("Você está aqui")
    .openPopup();

    mapa.setView([lat,lon],16);
  });
}

// CLICK MAPA
mapa.on("click", function(e){
  L.marker([e.latlng.lat,e.latlng.lng],{icon:icone('📌')})
  .addTo(mapa)
  .bindPopup("Ponto marcado")
  .openPopup();
});

</script>

</body>
</html>
